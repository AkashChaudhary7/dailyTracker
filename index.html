<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akash Chaudhary | Elite OS</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #ffffff;
            --muted: #666666;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --priority-high: #ff3e3e;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--accent); min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 440px; padding: 25px 20px 120px 20px; }
        .screen { display: none; animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .screen.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* --- Identity & Header --- */
        .header { text-align: left; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .full-name { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }

        /* --- Cards --- */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; }
        .label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }

        /* --- Task System --- */
        .task-card { background: var(--glass); border: 1px solid var(--border); padding: 14px; border-radius: 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .task-card.done { opacity: 0.4; background: transparent; }
        .repeat-badge { font-family: 'JetBrains Mono'; font-size: 0.5rem; background: var(--accent); color: black; padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        /* --- Milestone System --- */
        .mile-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .days-left { font-family: 'JetBrains Mono'; font-weight: 800; color: var(--success); font-size: 0.8rem; }

        /* --- Nav Bar --- */
        .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(25px); border-radius: 28px; border: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px; z-index: 2000; }
        .nav-item { color: var(--muted); transition: 0.3s; padding: 8px; border-radius: 15px; }
        .nav-item.active { color: var(--accent); background: var(--glass); }

        /* --- Inputs --- */
        input, select { width: 100%; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; outline: none; margin-bottom: 10px; }
        .btn-add { background: var(--accent); color: black; border: none; padding: 12px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--success); color: black; padding: 10px 20px; border-radius: 100px; font-weight: 800; font-size: 0.7rem; display: none; z-index: 9999; }
    </style>
</head>
<body>

<div id="toast">SYSTEM UPDATED ✓</div>

<div class="app-container">
    <header class="header">
        <h1 class="full-name">Akash Chaudhary</h1>
        <div style="font-family:'JetBrains Mono'; font-size:0.5rem; color:var(--muted)" id="last-reset-display">RESET: READY</div>
    </header>

    <div id="screen-dash" class="screen active">
        <div class="card" style="background: linear-gradient(160deg, #1a1a1a 0%, #050505 100%);">
            <span class="label">Total Net Worth</span>
            <div style="font-size: 1.8rem; font-weight: 800;" id="val-networth">₹0.00</div>
            <div style="height:4px; background:var(--border); border-radius:10px; margin: 15px 0;"><div id="xp-bar" style="height:100%; background:white; width:0%"></div></div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="rank-name" style="font-family:'JetBrains Mono'; font-size:0.5rem; border:1px solid white; padding:2px 8px; border-radius:20px;">NOVICE</span>
                <span id="streak-val" style="font-size: 0.65rem; font-weight:700; color: var(--priority-high);">STREAK 0</span>
            </div>
        </div>

        <div class="card">
            <span class="label">Upcoming Milestones</span>
            <div id="milestone-list"></div>
        </div>
    </div>

    <div id="screen-os" class="screen">
        <div class="card">
            <span class="label">Establish Protocol</span>
            <input type="text" id="task-in" placeholder="Task Name (!!! for High Priority)">
            <div style="display:flex; gap:10px;">
                <select id="task-type" style="flex:1">
                    <option value="once">Once</option>
                    <option value="daily">Daily Repeat</option>
                </select>
                <button onclick="addTask()" class="btn-add" style="flex:1">ADD</button>
            </div>
        </div>
        <div class="label">Active Protocols</div>
        <div id="task-list"></div>
    </div>

    <div id="screen-events" class="screen">
        <div class="card">
            <span class="label">Add Special Day</span>
            <input type="text" id="mile-name" placeholder="Event (e.g. Birthday)">
            <input type="date" id="mile-date">
            <button onclick="addMilestone()" class="btn-add">TRACK EVENT</button>
        </div>
    </div>

    </div>

<nav class="nav-dock">
    <div class="nav-item active" onclick="showScreen('dash', this)"><i data-lucide="grid"></i></div>
    <div class="nav-item" onclick="showScreen('os', this)"><i data-lucide="zap"></i></div>
    <div class="nav-item" onclick="showScreen('events', this)"><i data-lucide="calendar"></i></div>
    </nav>

<script>
    let db = JSON.parse(localStorage.getItem('akash_final_pro')) || {
        tasks: [], milestones: [], history: {}, xp: 0, streak: 0,
        wealth: { stocks: 0, funds: 0, cash: 0, auto: 0 },
        lastDate: new Date().toLocaleDateString(),
        notes: ""
    };

    function notify(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function save() {
        localStorage.setItem('akash_final_pro', JSON.stringify(db));
        render();
    }

    // --- AUTO-RESET LOGIC ---
    function checkDailyReset() {
        const today = new Date().toLocaleDateString();
        if (db.lastDate !== today) {
            // Reset daily tasks
            db.tasks.forEach(t => { if(t.repeat === 'daily') t.done = false; });
            db.lastDate = today;
            save();
            notify("DAILY PROTOCOLS RESET");
        }
    }

    // --- MILESTONE LOGIC ---
    function addMilestone() {
        const name = document.getElementById('mile-name').value;
        const date = document.getElementById('mile-date').value;
        if(!name || !date) return;
        db.milestones.push({ id: Date.now(), name, date });
        document.getElementById('mile-name').value = "";
        notify("EVENT ADDED");
        save();
    }

    function addTask() {
        const name = document.getElementById('task-in').value;
        const type = document.getElementById('task-type').value;
        if(!name) return;
        let prio = name.startsWith('!!!') ? 3 : 1;
        db.tasks.unshift({ id: Date.now(), text: name.replace('!!!',''), repeat: type, prio, done: false });
        document.getElementById('task-in').value = "";
        notify("PROTOCOL ADDED");
        save();
    }

    function toggleTask(id) {
        const t = db.tasks.find(x => x.id === id);
        t.done = !t.done;
        if(t.done) {
            db.xp += (t.prio * 100);
            confetti({ particleCount: 30 });
        }
        save();
    }

    function render() {
        // Render Milestones (Countdown logic)
        document.getElementById('milestone-list').innerHTML = db.milestones.map(m => {
            const diff = new Date(m.date) - new Date();
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            return `
                <div class="mile-row">
                    <div style="font-size:0.8rem; font-weight:600;">${m.name}</div>
                    <div class="days-left">${days < 0 ? 'PAST' : days + 'D LEFT'}</div>
                    <i data-lucide="x" size="12" onclick="db.milestones = db.milestones.filter(x=>x.id!==${m.id}); save()"></i>
                </div>
            `;
        }).join('');

        // Render Tasks
        document.getElementById('task-list').innerHTML = db.tasks.map(t => `
            <div class="task-card ${t.done ? 'done' : ''} ${t.prio === 3 ? 'prio-high' : ''}" onclick="toggleTask(${t.id})">
                <div style="flex:1">
                    <span style="font-weight:700; font-size:0.9rem;">${t.text}</span>
                    ${t.repeat === 'daily' ? '<span class="repeat-badge">DAILY</span>' : ''}
                </div>
                <i data-lucide="${t.done ? 'check-circle' : 'circle'}" size="18"></i>
                <i data-lucide="trash-2" size="12" style="margin-left:10px" onclick="event.stopPropagation(); db.tasks=db.tasks.filter(x=>x.id!==${t.id}); save()"></i>
            </div>
        `).join('');

        const netWorth = db.wealth.stocks + db.wealth.funds + db.wealth.cash;
        document.getElementById('val-networth').innerText = "₹" + netWorth.toLocaleString();
        document.getElementById('xp-bar').style.width = (db.xp % 2500) / 2500 * 100 + "%";
        document.getElementById('last-reset-display').innerText = "LOGGED: " + db.lastDate;

        lucide.createIcons();
    }

    function showScreen(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        lucide.createIcons();
    }

    checkDailyReset();
    render();
</script>
</body>
</html>
