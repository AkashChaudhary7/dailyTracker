<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akash Chaudhary | Elite OS Apex</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg: #050505;
            --surface: #121212;
            --accent: #ffffff;
            --muted: #666666;
            --border: rgba(255, 255, 255, 0.08);
            --glass: rgba(255, 255, 255, 0.03);
            --priority: #ff4747;
            --success: #00ff88;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--accent); min-height: 100vh; display: flex; justify-content: center; overflow-x: hidden; }
        
        .app-container { width: 100%; max-width: 440px; padding: 25px 20px 120px 20px; }
        .screen { display: none; animation: screenScale 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .screen.active { display: block; }

        @keyframes screenScale { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* --- Header --- */
        .header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .full-name { font-weight: 800; font-size: 1.1rem; letter-spacing: -0.5px; text-transform: uppercase; border-left: 3px solid var(--accent); padding-left: 10px; }

        /* --- Cards --- */
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 15px; position: relative; }
        .label { font-size: 0.55rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; display: block; }

        /* --- Task System --- */
        .task-card { background: var(--glass); border: 1px solid var(--border); padding: 14px; border-radius: 18px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .task-card.done { opacity: 0.3; }
        .task-card.high-p { border-left: 4px solid var(--priority); }
        .badge-daily { font-family: 'JetBrains Mono'; font-size: 0.5rem; background: var(--accent); color: black; padding: 2px 6px; border-radius: 4px; font-weight: 800; }

        /* --- Inputs & UI Controls --- */
        input, select, textarea { width: 100%; background: var(--glass); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: white; outline: none; margin-bottom: 12px; font-size: 0.85rem; }
        .btn-action { background: var(--accent); color: black; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-action:active { transform: scale(0.97); opacity: 0.8; }

        /* --- Navigation --- */
        .nav-dock { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 400px; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px; z-index: 2000; }
        .nav-item { color: var(--muted); transition: 0.3s; padding: 5px; cursor: pointer; }
        .nav-item.active { color: var(--accent); transform: translateY(-3px); }

        /* --- Feedback Toast --- */
        #toast { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: var(--success); color: black; padding: 10px 25px; border-radius: 50px; font-weight: 800; font-size: 0.7rem; display: none; z-index: 9999; box-shadow: 0 10px 25px rgba(0,255,136,0.2); }

        /* --- Progress Tracking --- */
        .xp-bar-bg { height: 4px; background: var(--border); border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .xp-bar-fill { height: 100%; background: var(--accent); transition: width 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
    </style>
</head>
<body>

<div id="toast">SYSTEM UPDATED ✓</div>

<div class="app-container">
    <header class="header">
        <h1 class="full-name">Akash Chaudhary</h1>
        <div id="status-tag" style="font-family: 'JetBrains Mono'; font-size: 0.5rem; color: var(--muted);">OS: OPTIMIZED</div>
    </header>

    <div id="screen-dash" class="screen active">
        <div class="card" style="background: linear-gradient(135deg, #151515 0%, #050505 100%);">
            <span class="label">Total Net Worth</span>
            <div style="font-size: 1.8rem; font-weight: 800;" id="dash-networth">₹0.00</div>
            <div class="xp-bar-bg"><div id="dash-xp-fill" class="xp-bar-fill"></div></div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span id="dash-rank" style="font-family:'JetBrains Mono'; font-size:0.5rem; border:1.5px solid white; padding:2px 10px; border-radius:20px;">ACCESSING...</span>
                <span id="dash-streak" style="font-size: 0.65rem; font-weight:700; color: var(--priority);">STREAK 0</span>
            </div>
        </div>

        <div class="card">
            <span class="label">Priority Milestones</span>
            <div id="dash-milestones"></div>
        </div>

        <div class="card">
            <span class="label">Elite Scratchpad</span>
            <textarea id="dash-notes" rows="3" placeholder="Log reminders..." style="background:transparent; border:none; margin:0; padding:0;"></textarea>
        </div>
    </div>

    <div id="screen-os" class="screen">
        <div class="card">
            <span class="label">Create New Protocol</span>
            <input type="text" id="os-input" placeholder="Task Name (!!! for Priority)">
            <div style="display:flex; gap:10px;">
                <select id="os-type" style="flex:1">
                    <option value="once">Once</option>
                    <option value="daily">Daily Reset</option>
                </select>
                <button onclick="osAddTask()" class="btn-action" style="flex:0.5">ADD</button>
            </div>
        </div>
        <div id="os-task-list"></div>
    </div>

    <div id="screen-events" class="screen">
        <div class="card">
            <span class="label">Track Special Occasion</span>
            <input type="text" id="ev-name" placeholder="Event Name">
            <input type="date" id="ev-date">
            <button onclick="evAdd()" class="btn-action">START COUNTDOWN</button>
        </div>
    </div>

    <div id="screen-wealth" class="screen">
        <div class="card">
            <span class="label">Portfolio Update</span>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><small class="label" style="opacity:0.5">STOCKS</small><input type="number" id="w-stocks"></div>
                <div><small class="label" style="opacity:0.5">FUNDS</small><input type="number" id="w-funds"></div>
                <div><small class="label" style="opacity:0.5">CASH</small><input type="number" id="w-cash"></div>
                <div><small class="label" style="opacity:0.5">AUTO-SAVE</small><input type="number" id="w-auto"></div>
            </div>
            <button onclick="wSync()" class="btn-action">SYNC WEALTH</button>
        </div>
        <div class="card">
            <span class="label">Primary Goal</span>
            <input type="text" id="g-name" placeholder="Goal Name">
            <input type="number" id="g-target" placeholder="Target Amount">
            <button onclick="gSet()" class="btn-action" style="background:transparent; border:1px solid var(--border); color:white;">SET OBJECTIVE</button>
        </div>
    </div>

    <div id="screen-phys" class="screen">
        <div class="card">
            <span class="label">Strength Training</span>
            <div id="phys-list"></div>
        </div>
        <div class="card" id="vault-lock">
            <span class="label">Vault Encryption</span>
            <input type="password" id="v-pin" placeholder="Enter PIN">
            <button onclick="vUnlock()" class="btn-action">DECRYPT</button>
        </div>
        <div id="vault-unlocked" style="display:none">
            <div class="card">
                <span class="label">Secure Data</span>
                <textarea id="v-data" rows="8"></textarea>
                <button onclick="vLock()" class="btn-action">SAVE & ENCRYPT</button>
            </div>
        </div>
    </div>
</div>

<nav class="nav-dock">
    <div class="nav-item active" onclick="navTo('dash', this)"><i data-lucide="layout"></i></div>
    <div class="nav-item" onclick="navTo('os', this)"><i data-lucide="shield"></i></div>
    <div class="nav-item" onclick="navTo('events', this)"><i data-lucide="calendar"></i></div>
    <div class="nav-item" onclick="navTo('wealth', this)"><i data-lucide="wallet"></i></div>
    <div class="nav-item" onclick="navTo('phys', this)"><i data-lucide="key"></i></div>
</nav>

<script>
    // --- APP STATE ---
    let db = JSON.parse(localStorage.getItem('akash_apex_os')) || {
        tasks: [], milestones: [], xp: 0, streak: 0,
        wealth: { stocks: 0, funds: 0, cash: 0, auto: 0, lastSyncMonth: new Date().getMonth() },
        phys: { deadlift: 0, squat: 0, kegel: 0 },
        goal: { title: "Unset", target: 1 },
        vault: { data: "", pin: "1234" },
        notes: "",
        lastDate: new Date().toLocaleDateString()
    };

    function msg(t) {
        const toast = document.getElementById('toast');
        toast.innerText = t; toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 2000);
    }

    function save() {
        localStorage.setItem('akash_apex_os', JSON.stringify(db));
        render();
    }

    // --- TEMPORAL ENGINE ---
    function runTemporalChecks() {
        const today = new Date().toLocaleDateString();
        const now = new Date();
        
        if (db.lastDate !== today) {
            db.tasks.forEach(t => { if(t.repeat === 'daily') t.done = false; });
            db.lastDate = today;
            msg("DAILY RESET COMPLETE");
        }
        
        if (db.wealth.lastSyncMonth !== now.getMonth()) {
            db.wealth.cash += (db.wealth.auto || 0);
            db.wealth.lastSyncMonth = now.getMonth();
            msg("MONTHLY SAVINGS CREDITED");
        }
        save();
    }

    // --- LOGIC ---
    function navTo(id, el) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        lucide.createIcons();
    }

    function osAddTask() {
        const name = document.getElementById('os-input').value;
        const type = document.getElementById('os-type').value;
        if(!name) return;
        const prio = name.startsWith('!!!') ? 3 : 1;
        db.tasks.unshift({ id: Date.now(), text: name.replace('!!!',''), repeat: type, prio, done: false });
        document.getElementById('os-input').value = "";
        msg("PROTOCOL ADDED"); save();
    }

    function osToggle(id) {
        const t = db.tasks.find(x => x.id === id);
        t.done = !t.done;
        if(t.done) {
            db.xp += (t.prio * 100);
            confetti({ particleCount: 30, origin: { y: 0.8 } });
        }
        save();
    }

    function evAdd() {
        const n = document.getElementById('ev-name').value;
        const d = document.getElementById('ev-date').value;
        if(!n || !d) return;
        db.milestones.push({ id: Date.now(), name: n, date: d });
        document.getElementById('ev-name').value = "";
        msg("EVENT TRACKED"); save();
    }

    function wSync() {
        db.wealth.stocks = parseFloat(document.getElementById('w-stocks').value) || 0;
        db.wealth.funds = parseFloat(document.getElementById('w-funds').value) || 0;
        db.wealth.cash = parseFloat(document.getElementById('w-cash').value) || 0;
        db.wealth.auto = parseFloat(document.getElementById('w-auto').value) || 0;
        msg("WEALTH SYNCHRONIZED"); save();
    }

    function gSet() {
        db.goal.title = document.getElementById('g-name').value;
        db.goal.target = parseFloat(document.getElementById('g-target').value) || 1;
        msg("GOAL UPDATED"); save();
    }

    function vUnlock() {
        if(document.getElementById('v-pin').value === db.vault.pin) {
            document.getElementById('vault-unlocked').style.display = 'block';
            document.getElementById('vault-lock').style.display = 'none';
        } else msg("WRONG PIN");
    }
    function vLock() {
        db.vault.data = document.getElementById('v-data').value;
        document.getElementById('vault-unlocked').style.display = 'none';
        document.getElementById('vault-lock').style.display = 'block';
        msg("VAULT SECURED"); save();
    }

    // --- RENDER ---
    function render() {
        const netWorth = db.wealth.stocks + db.wealth.funds + db.wealth.cash;
        document.getElementById('dash-networth').innerText = "₹" + netWorth.toLocaleString('en-IN');
        document.getElementById('dash-xp-fill').style.width = (db.xp % 2500) / 2500 * 100 + "%";
        
        const ranks = ["NOVICE", "SPECIALIST", "COMMANDER", "ARCHITECT", "ELITE"];
        document.getElementById('dash-rank').innerText = ranks[Math.min(Math.floor(db.xp / 2500), 4)];

        // Milestones
        document.getElementById('dash-milestones').innerHTML = db.milestones.map(m => {
            const diff = Math.ceil((new Date(m.date) - new Date()) / 86400000);
            return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:0.75rem;">
                <span>${m.name}</span>
                <span style="color:var(--success); font-weight:800;">${diff < 0 ? 'PAST' : diff + ' DAYS'}</span>
                <i data-lucide="trash-2" size="12" style="cursor:pointer" onclick="db.milestones=db.milestones.filter(x=>x.id!==${m.id});save()"></i>
            </div>`;
        }).join('');

        // Tasks
        document.getElementById('os-task-list').innerHTML = db.tasks.map(t => `
            <div class="task-card ${t.done ? 'done' : ''} ${t.prio === 3 ? 'high-p' : ''}" onclick="osToggle(${t.id})">
                <div style="flex:1">
                    <span style="font-weight:700; font-size:0.9rem;">${t.text}</span>
                    ${t.repeat === 'daily' ? '<span class="badge-daily">DAILY</span>' : ''}
                </div>
                <i data-lucide="${t.done ? 'check-circle' : 'circle'}" size="18"></i>
                <i data-lucide="x" size="12" style="margin-left:10px; color:var(--muted)" onclick="event.stopPropagation(); db.tasks=db.tasks.filter(x=>x.id!==${t.id});save()"></i>
            </div>
        `).join('');

        // Exercises
        document.getElementById('phys-list').innerHTML = ['deadlift', 'squat', 'kegel'].map(k => `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--border)">
                <span style="font-weight:800; text-transform:uppercase; font-size:0.7rem;">${k}</span>
                <button onclick="db.phys['${k}']++; db.xp+=150; save();" class="btn-action" style="width:auto; padding:5px 15px; font-size:0.6rem;">LOG (${db.phys[k]})</button>
            </div>
        `).join('');

        // Input Sync
        document.getElementById('dash-notes').value = db.notes;
        document.getElementById('w-stocks').value = db.wealth.stocks;
        document.getElementById('w-funds').value = db.wealth.funds;
        document.getElementById('w-cash').value = db.wealth.cash;
        document.getElementById('w-auto').value = db.wealth.auto;
        document.getElementById('v-data').value = db.vault.data;

        lucide.createIcons();
    }

    document.getElementById('dash-notes').addEventListener('input', (e) => { db.notes = e.target.value; localStorage.setItem('akash_apex_os', JSON.stringify(db)); });

    runTemporalChecks();
    render();
</script>
</body>
</html>
